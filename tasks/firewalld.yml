---
- name: Ensure custom firewalld services match requested mappings
  ansible.builtin.include_tasks: firewalld_services.yml
  loop: "{{ firewall_service_mapping }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - firewall_service_mapping | length > 0
  tags: [config]

- name: Read current firewalld default zone
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --get-default-zone
  register: firewalld_get_default_zone_cmd
  changed_when: false
  tags: [config]

- name: Set firewalld default zone when needed
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - "--set-default-zone={{ firewalld_default_zone }}"
  when:
    - firewalld_get_default_zone_cmd.stdout != firewalld_default_zone
  changed_when: true
  notify: reload firewall
  tags: [config]

- name: Allow numeric ports with firewalld
  ansible.posix.firewalld:
    port: "{{ item.name }}/{{ item.protocol | default(firewall_default_protocol) }}"
    zone: "{{ item.zone | default(firewalld_default_zone) }}"
    permanent: true
    state: enabled
  loop: "{{ firewall_services }}"
  loop_control:
    label: "{{ item.name }}/{{ item.protocol | default(firewall_default_protocol) }}"
  when:
    - (item.name | string) is match('^[0-9]+$')
    - item.action | default(firewall_default_action) == 'allow'
  notify: reload firewall
  tags: [config]

- name: Deny numeric ports with firewalld
  ansible.posix.firewalld:
    port: "{{ item.name }}/{{ item.protocol | default(firewall_default_protocol) }}"
    zone: "{{ item.zone | default(firewalld_default_zone) }}"
    permanent: true
    state: disabled
  loop: "{{ firewall_services }}"
  loop_control:
    label: "{{ item.name }}/{{ item.protocol | default(firewall_default_protocol) }}"
  when:
    - (item.name | string) is match('^[0-9]+$')
    - item.action | default(firewall_default_action) == 'deny'
  notify: reload firewall
  tags: [config]

- name: Allow named services with firewalld
  ansible.posix.firewalld:
    service: "{{ item.name }}"
    zone: "{{ item.zone | default(firewalld_default_zone) }}"
    permanent: true
    state: enabled
  loop: "{{ firewall_services }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ((item.name | string) is match('^[0-9]+$'))
    - item.action | default(firewall_default_action) == 'allow'
  notify: reload firewall
  tags: [config]

- name: Deny named services with firewalld
  ansible.posix.firewalld:
    service: "{{ item.name }}"
    zone: "{{ item.zone | default(firewalld_default_zone) }}"
    permanent: true
    state: disabled
  loop: "{{ firewall_services }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ((item.name | string) is match('^[0-9]+$'))
    - item.action | default(firewall_default_action) == 'deny'
  notify: reload firewall
  tags: [config]

- name: Ensure established outbound traffic rule exists when default output is deny
  ansible.builtin.command:
    argv:
      - firewall-offline-cmd
      - --direct
      - --add-rule
      - ipv4
      - filter
      - OUTPUT
      - '0'
      - -m
      - state
      - --state
      - ESTABLISHED,RELATED
      - -j
      - ACCEPT
  register: firewalld_add_established_rule
  changed_when: firewalld_add_established_rule.rc == 0
  failed_when:
    - firewalld_add_established_rule.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_established_rule.stderr | default(''))"
  when:
    - firewall_output_default_action == 'deny'
  notify: reload firewall
  tags: [config]

- name: Ensure allowed outbound ports exist when default output is deny
  ansible.builtin.command:
    argv:
      - firewall-offline-cmd
      - --direct
      - --add-rule
      - ipv4
      - filter
      - OUTPUT
      - '1'
      - -p
      - "{{ item.protocol }}"
      - -m
      - "{{ item.protocol }}"
      - --dport
      - "{{ item.port }}"
      - -j
      - ACCEPT
  loop: "{{ firewall_output_allow_ports }}"
  loop_control:
    label: "{{ item.port }}/{{ item.protocol }}"
  register: firewalld_add_outbound_allow_rule
  changed_when: firewalld_add_outbound_allow_rule.rc == 0
  failed_when:
    - firewalld_add_outbound_allow_rule.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_outbound_allow_rule.stderr | default(''))"
  when:
    - firewall_output_default_action == 'deny'
  notify: reload firewall
  tags: [config]

- name: Ensure final outbound drop rule exists when default output is deny
  ansible.builtin.command:
    argv:
      - firewall-offline-cmd
      - --direct
      - --add-rule
      - ipv4
      - filter
      - OUTPUT
      - '2'
      - -j
      - DROP
  register: firewalld_add_drop_rule
  changed_when: firewalld_add_drop_rule.rc == 0
  failed_when:
    - firewalld_add_drop_rule.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_drop_rule.stderr | default(''))"
  when:
    - firewall_output_default_action == 'deny'
  notify: reload firewall
  tags: [config]

- name: Remove established outbound traffic rule when default output is allow
  ansible.builtin.command:
    argv:
      - firewall-offline-cmd
      - --direct
      - --remove-rule
      - ipv4
      - filter
      - OUTPUT
      - '0'
      - -m
      - state
      - --state
      - ESTABLISHED,RELATED
      - -j
      - ACCEPT
  register: firewalld_remove_established_rule
  changed_when: firewalld_remove_established_rule.rc == 0
  failed_when: firewalld_remove_established_rule.rc not in [0, 2]
  when:
    - firewall_output_default_action == 'allow'
  notify: reload firewall
  tags: [config]

- name: Remove explicit allowed outbound ports when default output is allow
  ansible.builtin.command:
    argv:
      - firewall-offline-cmd
      - --direct
      - --remove-rule
      - ipv4
      - filter
      - OUTPUT
      - '1'
      - -p
      - "{{ item.protocol }}"
      - -m
      - "{{ item.protocol }}"
      - --dport
      - "{{ item.port }}"
      - -j
      - ACCEPT
  loop: "{{ firewall_output_allow_ports }}"
  loop_control:
    label: "{{ item.port }}/{{ item.protocol }}"
  register: firewalld_remove_outbound_allow_rule
  changed_when: firewalld_remove_outbound_allow_rule.rc == 0
  failed_when: firewalld_remove_outbound_allow_rule.rc not in [0, 2]
  when:
    - firewall_output_default_action == 'allow'
  notify: reload firewall
  tags: [config]

- name: Remove final outbound drop rule when default output is allow
  ansible.builtin.command:
    argv:
      - firewall-offline-cmd
      - --direct
      - --remove-rule
      - ipv4
      - filter
      - OUTPUT
      - '2'
      - -j
      - DROP
  register: firewalld_remove_drop_rule
  changed_when: firewalld_remove_drop_rule.rc == 0
  failed_when: firewalld_remove_drop_rule.rc not in [0, 2]
  when:
    - firewall_output_default_action == 'allow'
  notify: reload firewall
  tags: [config]

- name: Assign interfaces to firewalld zones
  ansible.posix.firewalld:
    interface: "{{ item.interface }}"
    zone: "{{ item.zone }}"
    permanent: true
    state: enabled
  loop: "{{ firewall_interface_zone }}"
  loop_control:
    label: "{{ item.interface }} -> {{ item.zone }}"
  when:
    - firewall_interface_zone | length > 0
  notify: reload firewall
  tags: [config]

- name: Flush handlers before applying runtime SSH exception
  ansible.builtin.meta: flush_handlers
  tags: [config]

- name: Keep current SSH port open at runtime
  ansible.posix.firewalld:
    port: "{{ ansible_port }}/tcp"
    permanent: false
    state: enabled
  when:
    - ansible_port is defined
  tags: [config]
