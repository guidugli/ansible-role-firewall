---
# tasks/main.yml — guidugli.firewall
# Purpose: Validate inputs, install firewall packages, detect host capabilities,
# and dispatch backend-specific firewall configuration.

- name: Detect SSH settings for SSH-based connections
  ansible.builtin.import_tasks: detect_sshd_port.yml
  when:
    - ansible_connection | default('ssh') in ['ssh', 'paramiko']
  tags: [facts]

- name: Run semantic assertions
  ansible.builtin.import_tasks: assert.yml
  tags: [validate]

- name: Fail when firewalld is requested on a non-systemd target
  ansible.builtin.fail:
    msg: firewalld requires a systemd-managed host.
  when:
    - firewall_selected == 'firewalld'
    - ansible_facts['service_mgr'] | default('unknown') != 'systemd'
  tags: [validate]

- name: Gather installed service facts
  ansible.builtin.service_facts:
  tags: [facts]

- name: Update apt package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_facts['pkg_mgr'] | default('') == 'apt'
  tags: [install]

- name: Install required firewall packages on APT-based systems
  ansible.builtin.apt:
    name: "{{ firewall_packages_required }}"
    state: present
    update_cache: true
  when:
    - ansible_facts['pkg_mgr'] | default('') == 'apt'
    - firewall_packages_required is defined
    - firewall_packages_required | length > 0
  tags: [install]

- name: Install required firewall packages on non-APT systems
  ansible.builtin.package:
    name: "{{ firewall_packages_required }}"
    state: present
  when:
    - ansible_facts['pkg_mgr'] | default('') != 'apt'
    - firewall_packages_required is defined
    - firewall_packages_required | length > 0
  tags: [install]

- name: Disable conflicting firewall services when present
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop: "{{ firewall_conflicting_services | default([]) }}"
  when:
    - firewall_conflicting_services is defined
    - firewall_conflicting_services | length > 0
    - >-
      (
        ansible_facts['service_mgr'] | default('') == 'systemd'
        and ansible_facts.services[item ~ '.service'] is defined
        and ansible_facts.services[item ~ '.service'].status != 'not-found'
      )
      or
      (
        ansible_facts['service_mgr'] | default('') != 'systemd'
        and ansible_facts.services[item] is defined
        and ansible_facts.services[item].status != 'not-found'
      )
  tags: [service]

- name: Detect IPv6 support
  ansible.builtin.import_tasks: check_ipv6_support.yml
  tags: [facts]

- name: Disable IPv6 in UFW defaults when unsupported by the host
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: IPV6=no
  when:
    - firewall_selected == 'ufw'
    - not firewall_ipv6_enabled | default(false)
  tags: [config]

- name: Ensure primary firewall service is enabled and started
  ansible.builtin.service:
    name: "{{ firewall_ipv4_service_name }}"
    state: started
    enabled: true
  tags: [service]

- name: Apply backend-specific firewall tasks
  ansible.builtin.include_tasks: "{{ firewall_selected }}.yml"
  tags: [config]
