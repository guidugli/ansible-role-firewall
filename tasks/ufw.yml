---
- name: Configure loopback protection rules
  block:
    - name: Allow incoming loopback traffic
      community.general.ufw:
        rule: allow
        interface: lo
        direction: in

    - name: Allow outgoing loopback traffic
      community.general.ufw:
        rule: allow
        interface: lo
        direction: out

    - name: Deny spoofed IPv4 loopback traffic
      community.general.ufw:
        rule: deny
        direction: in
        from: 127.0.0.0/8

    - name: Deny spoofed IPv6 loopback traffic
      community.general.ufw:
        rule: deny
        direction: in
        from: ::1
      when:
        - firewall_ipv6_enabled | default(false)
  tags: [config]

- name: Set UFW default policies
  block:
    - name: Deny incoming traffic by default
      community.general.ufw:
        default: deny
        direction: incoming

    - name: Deny routed traffic by default
      community.general.ufw:
        default: deny
        direction: routed

    - name: Set outgoing default policy
      community.general.ufw:
        default: "{{ firewall_output_default_action }}"
        direction: outgoing
  tags: [config]

- name: Allow selected outgoing ports when default output is deny
  community.general.ufw:
    rule: allow
    direction: out
    port: "{{ item.port }}"
    proto: "{{ item.protocol }}"
  loop: "{{ firewall_output_allow_ports }}"
  loop_control:
    label: "{{ item.port }}/{{ item.protocol }}"
  when:
    - firewall_output_default_action == 'deny'
  tags: [config]

- name: Remove explicit outgoing allow rules when default output is allow
  community.general.ufw:
    rule: allow
    direction: out
    port: "{{ item.port }}"
    proto: "{{ item.protocol }}"
    delete: true
  loop: "{{ firewall_output_allow_ports }}"
  loop_control:
    label: "{{ item.port }}/{{ item.protocol }}"
  when:
    - firewall_output_default_action == 'allow'
  tags: [config]

- name: Allow mapped service ports with UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.1.split('/')[0] }}"
    proto: "{{ item.1.split('/')[1] }}"
  loop: "{{ firewall_service_mapping | subelements('ports') }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  vars:
    service_record: >-
      {{
        firewall_services
        | selectattr('name', 'equalto', item.0.name)
        | first
        | default({})
      }}
  when:
    - service_record != {}
    - service_record.action | default(firewall_default_action) == 'allow'
  tags: [config]

- name: Remove mapped service ports when service action is deny
  community.general.ufw:
    rule: allow
    port: "{{ item.1.split('/')[0] }}"
    proto: "{{ item.1.split('/')[1] }}"
    delete: true
  loop: "{{ firewall_service_mapping | subelements('ports') }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  vars:
    service_record: >-
      {{
        firewall_services
        | selectattr('name', 'equalto', item.0.name)
        | first
        | default({})
      }}
  when:
    - service_record != {}
    - service_record.action | default(firewall_default_action) == 'deny'
  tags: [config]

- name: Allow direct service or port entries with UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.name }}"
    proto: "{{ item.protocol | default(firewall_default_protocol) }}"
  loop: "{{ firewall_services }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    mapped_service: >-
      {{
        firewall_service_mapping
        | selectattr('name', 'equalto', item.name)
        | first
        | default({})
      }}
  when:
    - mapped_service == {}
    - item.action | default(firewall_default_action) == 'allow'
  tags: [config]

- name: Remove direct service or port entries when action is deny
  community.general.ufw:
    rule: allow
    port: "{{ item.name }}"
    proto: "{{ item.protocol | default(firewall_default_protocol) }}"
    delete: true
  loop: "{{ firewall_services }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    mapped_service: >-
      {{
        firewall_service_mapping
        | selectattr('name', 'equalto', item.name)
        | first
        | default({})
      }}
  when:
    - mapped_service == {}
    - item.action | default(firewall_default_action) == 'deny'
  tags: [config]

- name: Determine whether UFW activation should be skipped
  ansible.builtin.set_fact:
    firewall_skip_ufw_enable: >-
      {{
        ansible_facts['virtualization_type'] | default('') in _container_types
        and ansible_facts['virtualization_role'] | default('guest') == 'guest'
      }}
  tags: [config]

- name: Explain why UFW enable is skipped
  ansible.builtin.debug:
    msg: >-
      Skipping UFW enable on a container guest because ufw -f enable may fail
      when sysctl changes are restricted by the container runtime.
  when:
    - firewall_skip_ufw_enable
  changed_when: false
  tags: [config]

- name: Ensure UFW is enabled
  community.general.ufw:
    state: enabled
  when:
    - not firewall_skip_ufw_enable
  tags: [config]
