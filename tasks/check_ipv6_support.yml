---
- name: Check whether the IPv6 interface table exists
  ansible.builtin.stat:
    path: /proc/net/if_inet6
  register: firewall_ipv6_proc
  tags: [facts]

- name: Read sysctl net.ipv6.conf.all.disable_ipv6
  ansible.builtin.command:
    argv:
      - sysctl
      - -b
      - net.ipv6.conf.all.disable_ipv6
  register: firewall_ipv6_all_disable
  changed_when: false
  failed_when: false
  tags: [facts]

- name: Read sysctl net.ipv6.conf.default.disable_ipv6
  ansible.builtin.command:
    argv:
      - sysctl
      - -b
      - net.ipv6.conf.default.disable_ipv6
  register: firewall_ipv6_default_disable
  changed_when: false
  failed_when: false
  tags: [facts]

- name: Set IPv6 support fact
  ansible.builtin.set_fact:
    firewall_ipv6_enabled: >-
      {{
        firewall_ipv6_proc.stat.exists | default(false)
        and (firewall_ipv6_all_disable.stdout | default('0') | trim == '0')
        and (firewall_ipv6_default_disable.stdout | default('0') | trim == '0')
      }}
  tags: [facts]
